<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Vault Login | BIJOY & SONA Jewellery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --midnight-onyx: #0a0a0a;       /* Elegant pure matte black */
            --charcoal-panel: #141414;      /* Deep premium charcoal contrast */
            --imperial-gold: #cfa86b;       /* Muted satin luxury gold */
            --subtle-gold: rgba(207, 168, 107, 0.15);
            --text-light: #e6e6e6;
            --text-muted: #8c8c8c;
            --gold-gradient: linear-gradient(135deg, #a68042 0%, #dbba83 50%, #b89355 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--midnight-onyx);
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
            font-family: 'Playfair Display', serif;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient subtle background graphics for high luxury depth */
        body::before {
            content: "⚜️";
            position: absolute;
            font-size: 25rem;
            opacity: 0.02;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            font-family: serif;
        }

        /* Top Left Elegant Back to Home Navigation */
        .home-navigation {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 1000;
        }

        /* The Ultimate Luxury Portal Container */
        .login-card {
            width: 100%;
            max-width: 460px;
            background: var(--charcoal-panel);
            padding: 60px 50px;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.85), 
                        0 0 50px rgba(207, 168, 107, 0.03);
            border: 1px solid rgba(207, 168, 107, 0.15);
            text-align: center;
            animation: cardReveal 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Animated elegant gold accent strip at the top of the card */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--imperial-gold), transparent);
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Brand Headers */
        .brand-crest {
            font-size: 1.8rem;
            color: var(--imperial-gold);
            margin-bottom: 15px;
            letter-spacing: 4px;
        }

        .brand-name {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: 4px;
            color: #f2e3cb;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .brand-subtitle {
            font-family: 'Cinzel', serif;
            font-size: 0.68rem;
            letter-spacing: 5px;
            color: var(--imperial-gold);
            text-transform: uppercase;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .portal-title {
            font-size: 1.15rem;
            font-weight: 300;
            color: var(--text-light);
            margin-bottom: 35px;
            letter-spacing: 1px;
            font-style: italic;
        }

        /* High-Luxury Inputs styling */
        .input-group {
            position: relative;
            margin-bottom: 35px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--imperial-gold);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            background: rgba(10, 10, 10, 0.4);
            border: 1px solid rgba(207, 168, 107, 0.15);
            padding: 16px 18px;
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            color: var(--text-light);
            outline: none;
            border-radius: 2px;
            letter-spacing: 0.5px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-field::placeholder {
            color: #4a4a4a;
            font-style: italic;
            font-size: 0.95rem;
        }

        .input-field:focus {
            border-color: var(--imperial-gold);
            background: rgba(207, 168, 107, 0.02);
            box-shadow: 0 0 15px rgba(207, 168, 107, 0.08);
        }

        /* Remember Me & Help Links row */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            font-size: 0.85rem;
            gap: 10px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 300;
            user-select: none;
        }

        .remember-me input {
            accent-color: var(--imperial-gold);
            cursor: pointer;
        }

        .forgot-link {
            color: var(--imperial-gold);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }

        .forgot-link:hover {
            opacity: 0.7;
        }

        /* Action Buttons */
        .btn-vault-enter {
            width: 100%;
            padding: 20px;
            background: var(--midnight-onyx);
            color: var(--imperial-gold);
            border: 1px solid var(--imperial-gold);
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .btn-vault-enter:hover {
            color: var(--midnight-onyx);
            border-color: transparent;
            background: var(--gold-gradient);
            box-shadow: 0 12px 30px rgba(207, 168, 107, 0.35);
            transform: translateY(-2px);
        }

        .btn-vault-enter:active {
            transform: translateY(0);
        }

        /* Bottom Footer Credentials */
        .vault-footer {
            margin-top: 45px;
            border-top: 1px solid rgba(207, 168, 107, 0.1);
            padding-top: 25px;
        }

        .vault-footer p {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 300;
            margin-bottom: 8px;
        }

        .request-access {
            font-family: 'Cinzel', serif;
            font-size: 0.72rem;
            color: var(--imperial-gold);
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: opacity 0.3s;
        }

        .request-access:hover {
            opacity: 0.7;
        }

        /* Fine responsive optimization */
        @media (max-width: 500px) {
            body { padding: 40px 15px; }
            .home-navigation { top: 20px; left: 15px; position: relative; width: 100%; text-align: left; margin-bottom: 20px; }
            .login-card { padding: 45px 25px; }
            .brand-name { font-size: 1.35rem; }
            .form-options { flex-direction: column; align-items: flex-start; gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <div class="brand-crest">⚜️</div>
        <h1 class="brand-name">Bijoy & Sona</h1>
        <p class="brand-subtitle">Fine Jewellery</p>
        
        <p class="portal-title">Enter Private Client Vault</p>

        <form id="royalLoginForm" onsubmit="handleLogin(event)">
            
            <div class="input-group">
                <label for="clientUid">Client Identifier</label>
                <input 
                    type="text" 
                    id="clientUid" 
                    class="input-field" 
                    placeholder="Enter Private ID or Email" 
                    required autocomplete="off"
                >
            </div>

            <div class="input-group">
                <label for="clientKey">Passkey / Signature</label>
                <input 
                    type="password" 
                    id="clientKey" 
                    class="input-field" 
                    placeholder="••••••••••••" 
                    required
                >
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberDevice"> Secure Remember
                </label>
                <a href="#" class="forgot-link" onclick="alert('Concierge Note: Please contact the Atelier desk directly at +91 98282 38550 to re-verify your private credentials.')">
                    Lost Credentials?
                </a>
            </div>

            <button type="submit" class="btn-vault-enter" id="loginBtn">
                Authenticate Secure Entry
            </button>
        </form>

        <div class="vault-footer">
            <p>New partner or royal representative?</p>
            <a href="create account.html" class="request-access">Create Account →</a>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerText = "VERIFYING SIGNATURE...";
            btn.disabled = true;

            // Simulated premium experience loader
            setTimeout(() => {
                alert("Welcome back. Interface signature accepted securely.");
                window.location.href = "MM.html"; 
            }, 1200);
        }
    </script>
</body>
</html>
